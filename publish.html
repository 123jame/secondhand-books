<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布书籍 - 二手书集市</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <i class="fas fa-arrow-left text-gray-600"></i>
                <span class="text-lg font-medium text-gray-800">返回</span>
            </div>
            <span class="text-lg font-bold text-gray-800">发布二手书</span>
            <div class="w-8"></div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <!-- ISBN快速录入 -->
            <div class="mb-6 p-4 bg-indigo-50 rounded-xl">
                <label class="block text-sm font-medium text-indigo-800 mb-2">
                    <i class="fas fa-barcode mr-2"></i>ISBN快速录入（可选）
                </label>
                <div class="flex gap-2">
                    <input type="text" id="isbnInput" placeholder="输入ISBN码自动获取书籍信息" 
                        class="flex-1 px-4 py-2 border border-indigo-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="fetchBookInfo()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
                        <i class="fas fa-search"></i> 查询
                    </button>
                </div>
                <p class="text-xs text-indigo-600 mt-2">支持豆瓣、OpenLibrary数据源</p>
            </div>

            <form id="publishForm" onsubmit="submitBook(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">书籍名称 *</label>
                        <input type="text" id="title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">作者 *</label>
                            <input type="text" id="author" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">分类 *</label>
                            <select id="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="">请选择</option>
                                <option value="文学">文学</option>
                                <option value="技术">技术</option>
                                <option value="教材">教材</option>
                                <option value="社科">社科</option>
                                <option value="艺术">艺术</option>
                                <option value="生活">生活</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">售价 (元) *</label>
                            <input type="number" id="price" required min="0" step="0.1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">原价 (元)</label>
                            <input type="number" id="originalPrice" min="0" step="0.1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">品相 *</label>
                            <select id="condition" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="全新">全新</option>
                                <option value="九成新">九成新</option>
                                <option value="八成新">八成新</option>
                                <option value="七成新">七成新</option>
                                <option value="有瑕疵">有瑕疵</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">所在城市 *</label>
                            <input type="text" id="location" required placeholder="如：北京" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">封面图片 URL</label>
                        <input type="url" id="cover" placeholder="https://..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <p class="text-xs text-gray-500 mt-1">可留空，将使用默认封面</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">书籍描述</label>
                        <textarea id="description" rows="3" placeholder="描述书籍的具体情况，如：是否有笔记、划线、破损等" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">联系方式 *</label>
                        <input type="text" id="seller" required placeholder="微信/手机号" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition flex justify-center items-center gap-2">
                        <i class="fas fa-paper-plane"></i> 立即发布
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 模拟ISBN查询（实际项目中调用豆瓣API）
        function fetchBookInfo() {
            const isbn = document.getElementById('isbnInput').value.trim();
            if (!isbn) {
                alert('请输入ISBN');
                return;
            }

            // 模拟API调用
            const mockData = {
                '9787115545381': {
                    title: 'JavaScript高级程序设计',
                    author: '马特·弗里斯比',
                    cover: 'https://img9.doubanio.com/view/subject/l/public/s33591675.jpg',
                    price: 99
                }
            };

            if (mockData[isbn]) {
                const data = mockData[isbn];
                document.getElementById('title').value = data.title;
                document.getElementById('author').value = data.author;
                document.getElementById('cover').value = data.cover;
                document.getElementById('originalPrice').value = data.price;
                alert('已自动填充书籍信息，请补充其他信息');
            } else {
                alert('未找到该ISBN对应的书籍，请手动填写');
            }
        }

        function submitBook(e) {
            e.preventDefault();
            
            const newBook = {
                id: Date.now(),
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                price: parseFloat(document.getElementById('price').value),
                originalPrice: parseFloat(document.getElementById('originalPrice').value) || 0,
                category: document.getElementById('category').value,
                condition: document.getElementById('condition').value,
                cover: document.getElementById('cover').value || 'https://via.placeholder.com/300x400?text=No+Cover',
                location: document.getElementById('location').value,
                seller: document.getElementById('seller').value,
                isbn: document.getElementById('isbnInput').value || '未知',
                description: document.getElementById('description').value || '暂无描述',
                createTime: new Date().toISOString()
            };

            const books = JSON.parse(localStorage.getItem('books') || '[]');
            books.unshift(newBook);
            localStorage.setItem('books', JSON.stringify(books));

            alert('发布成功！');
            location.href = 'index.html';
        }
    </script>
</body>
</html>
