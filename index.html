<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二手书集市 - 让好书流动起来</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .book-card { transition: all 0.3s ease; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .tag { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-book-open text-2xl text-indigo-600"></i>
                <span class="text-xl font-bold text-gray-800">二手书集市</span>
            </div>
            <div class="flex gap-4">
                <a href="index.html" class="text-indigo-600 font-medium">首页</a>
                <a href="publish.html" class="text-gray-600 hover:text-indigo-600">
                    <i class="fas fa-plus-circle"></i> 发布
                </a>
                <a href="my.html" class="text-gray-600 hover:text-indigo-600">
                    <i class="fas fa-user"></i> 我的
                </a>
            </div>
        </div>
    </nav>

    <!-- 搜索区 -->
    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 py-12">
        <div class="max-w-2xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-bold text-white mb-4">发现身边的二手好书</h1>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="搜索书名、作者、ISBN..." 
                    class="w-full px-6 py-4 rounded-full text-lg shadow-lg focus:outline-none focus:ring-4 focus:ring-white/30">
                <button onclick="searchBooks()" class="absolute right-2 top-2 bg-indigo-600 text-white px-6 py-2 rounded-full hover:bg-indigo-700">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 分类筛选 -->
    <div class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex gap-3 overflow-x-auto pb-2" id="categoryFilter">
            <button onclick="filterCategory('all')" class="px-4 py-2 bg-indigo-600 text-white rounded-full text-sm whitespace-nowrap">全部</button>
            <button onclick="filterCategory('文学')" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm whitespace-nowrap hover:bg-gray-100">文学</button>
            <button onclick="filterCategory('技术')" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm whitespace-nowrap hover:bg-gray-100">技术</button>
            <button onclick="filterCategory('教材')" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm whitespace-nowrap hover:bg-gray-100">教材</button>
            <button onclick="filterCategory('社科')" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm whitespace-nowrap hover:bg-gray-100">社科</button>
        </div>
    </div>

    <!-- 书籍列表 -->
    <div class="max-w-6xl mx-auto px-4 pb-12">
        <div id="bookList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- 动态生成 -->
        </div>
        <div id="emptyState" class="hidden text-center py-20">
            <i class="fas fa-book text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500">暂无书籍，快来发布第一本吧！</p>
        </div>
    </div>

    <script>
        // 初始化示例数据
        const sampleBooks = [
            {
                id: 1,
                title: "JavaScript高级程序设计",
                author: "马特·弗里斯比",
                price: 35,
                originalPrice: 99,
                category: "技术",
                condition: "九成新",
                cover: "https://img9.doubanio.com/view/subject/l/public/s33591675.jpg",
                location: "北京",
                seller: "码农小王",
                isbn: "9787115545381",
                description: "前50页有笔记，后面全新"
            },
            {
                id: 2,
                title: "百年孤独",
                author: "加西亚·马尔克斯",
                price: 28,
                originalPrice: 55,
                category: "文学",
                condition: "全新",
                cover: "https://img9.doubanio.com/view/subject/l/public/s33552117.jpg",
                location: "上海",
                seller: "读书爱好者",
                isbn: "9787544253994",
                description: "买重了，全新未拆封"
            },
            {
                id: 3,
                title: "经济学原理",
                author: "曼昆",
                price: 45,
                originalPrice: 128,
                category: "教材",
                condition: "八成新",
                cover: "https://img9.doubanio.com/view/subject/l/public/s33554945.jpg",
                location: "广州",
                seller: "大四学姐",
                isbn: "9787301256909",
                description: "考研用书，有重点标记"
            }
        ];

        // 初始化数据
        if (!localStorage.getItem('books')) {
            localStorage.setItem('books', JSON.stringify(sampleBooks));
        }

        let currentFilter = 'all';

        function renderBooks(books) {
            const container = document.getElementById('bookList');
            const emptyState = document.getElementById('emptyState');
            
            if (books.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            container.innerHTML = books.map(book => `
                <div class="book-card bg-white rounded-xl shadow-md overflow-hidden cursor-pointer" onclick="viewDetail(${book.id})">
                    <div class="relative h-48 overflow-hidden bg-gray-200">
                        <img src="${book.cover}" alt="${book.title}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=No+Cover'">
                        <span class="absolute top-2 right-2 tag text-white text-xs px-2 py-1 rounded-full">${book.condition}</span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-gray-800 mb-1 line-clamp-1">${book.title}</h3>
                        <p class="text-sm text-gray-500 mb-2">${book.author}</p>
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-xl font-bold text-red-500">¥${book.price}</span>
                                <span class="text-xs text-gray-400 line-through">¥${book.originalPrice}</span>
                            </div>
                            <span class="text-xs text-gray-400"><i class="fas fa-map-marker-alt"></i> ${book.location}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(category) {
            currentFilter = category;
            const books = JSON.parse(localStorage.getItem('books') || '[]');
            const filtered = category === 'all' ? books : books.filter(b => b.category === category);
            renderBooks(filtered);
            
            // 更新按钮样式
            document.querySelectorAll('#categoryFilter button').forEach(btn => {
                if (btn.textContent === (category === 'all' ? '全部' : category)) {
                    btn.classList.remove('bg-white', 'text-gray-600');
                    btn.classList.add('bg-indigo-600', 'text-white');
                } else {
                    btn.classList.remove('bg-indigo-600', 'text-white');
                    btn.classList.add('bg-white', 'text-gray-600');
                }
            });
        }

        function searchBooks() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const books = JSON.parse(localStorage.getItem('books') || '[]');
            const filtered = books.filter(b => 
                b.title.toLowerCase().includes(keyword) || 
                b.author.toLowerCase().includes(keyword) ||
                b.isbn.includes(keyword)
            );
            renderBooks(filtered);
        }

        function viewDetail(id) {
            window.location.href = `book.html?id=${id}`;
        }

        // 监听回车搜索
        document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBooks();
        });

        // 初始化渲染
        renderBooks(JSON.parse(localStorage.getItem('books') || '[]'));
    </script>
</body>
</html>
